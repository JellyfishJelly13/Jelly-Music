<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jelly Music</title>
  <style>
    /* --- CSS Variables & Theming --- */
    :root {
      --bg-dark: #0f0f13;
      --text-main: #ffffff;
      --text-muted: #a1a1a6;
      --accent: #d946ef; /* Jelly Purple/Pink */
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(16px) saturate(180%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding-bottom: 100px; /* Space for the bottom player */
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent); }

    /* --- Glassmorphism Utilities --- */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
    }

    /* --- Layout --- */
    header {
      padding: 20px 5%;
      position: sticky;
      top: 0;
      z-index: 50;
      border-radius: 0 0 16px 16px;
      border-top: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.5rem; background: linear-gradient(90deg, #d946ef, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    main { padding: 30px 5%; min-height: 80vh; }

    /* --- Cards & Grids --- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .card { padding: 15px; text-align: center; cursor: pointer; transition: transform 0.3s ease; }
    .card:hover { transform: translateY(-5px); }
    .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
    .card h3 { font-size: 1.1rem; margin-bottom: 5px; }
    .card p { font-size: 0.9rem; color: var(--text-muted); }

    /* --- Track List --- */
    .track-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .track-item { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 15px; cursor: pointer; transition: background 0.2s; 
    }
    .track-item:hover { background: rgba(255, 255, 255, 0.1); }
    .track-info h4 { font-size: 1rem; }
    .track-info p { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

    /* --- Player UI --- */
    #player {
      position: fixed; bottom: 10px; left: 2%; right: 2%;
      padding: 15px 20px;
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
      z-index: 100;
      gap: 15px;
    }
    .player-info { display: flex; align-items: center; gap: 15px; flex: 1; min-width: 200px; }
    .player-info img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #333; }
    .player-controls { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: center; }
    .btn { background: transparent; border: none; color: white; cursor: pointer; font-size: 1.5rem; transition: transform 0.2s; }
    .btn:hover { transform: scale(1.1); color: var(--accent); }
    .btn-play { background: var(--text-main); color: var(--bg-dark); border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
    .btn-play:hover { background: var(--accent); color: white; }

    .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--text-muted); }
    .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; cursor: pointer; position: relative; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; pointer-events: none; }

    /* --- Lyrics UI --- */
    #lyrics-modal {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(15, 15, 19, 0.95);
      backdrop-filter: blur(20px);
      z-index: 40; display: none; flex-direction: column;
      padding: 100px 5% 150px;
      overflow-y: hidden;
    }
    #lyrics-modal.active { display: flex; }
    #lyrics-container { flex: 1; overflow-y: auto; text-align: center; scroll-behavior: smooth; padding: 50vh 0; }
    /* Hide scrollbar */
    #lyrics-container::-webkit-scrollbar { display: none; }
    .lyric-line { font-size: 1.5rem; color: var(--text-muted); margin: 15px 0; transition: color 0.3s, transform 0.3s; opacity: 0.5; }
    .lyric-line.active { color: var(--text-main); font-size: 2rem; opacity: 1; font-weight: bold; transform: scale(1.05); }

    .view-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
    .view-header img { width: 200px; height: 200px; border-radius: 16px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    @media (max-width: 600px) {
      .player-info { flex: 100%; justify-content: center; text-align: center; }
      .player-controls { flex: 100%; }
      .view-header { justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>

  <header class="glass">
    <a href="#home"><h1>Jelly Music</h1></a>
    <button class="btn" id="toggle-lyrics" title="Toggle Lyrics">📝</button>
  </header>

  <main id="app-content">
    <!-- Dynamic Content Loads Here -->
    <div style="text-align: center; padding: 50px;">Loading Jelly Music...</div>
  </main>

  <!-- Lyrics Overlay -->
  <div id="lyrics-modal">
    <div id="lyrics-container"></div>
  </div>

  <!-- Sticky Bottom Player -->
  <footer id="player" class="glass">
    <div class="player-info">
      <img id="player-cover" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Cover">
      <div>
        <h4 id="player-title">No track selected</h4>
        <p id="player-artist" style="font-size: 0.8rem; color: var(--text-muted);">---</p>
      </div>
    </div>
    
    <div style="display: flex; flex-direction: column; flex: 2; min-width: 250px;">
      <div class="player-controls">
        <button class="btn btn-play" id="play-pause-btn">▶</button>
      </div>
      <div class="progress-container">
        <span id="time-current">0:00</span>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span id="time-total">0:00</span>
      </div>
    </div>
  </footer>

  <script>
    /* --- State & Config --- */
    const FIREBASE_URL = "https://jelly-now-playing-default-rtdb.firebaseio.com/jelly-music.json";
    let db = { albums: {}, artists: {} };
    
    // Audio Player State
    const audio = new Audio();
    let isPlaying = false;
    let currentTrack = null;
    let lyricsData = [];
    let isLyricsOpen = false;

    // DOM Elements
    const appContent = document.getElementById('app-content');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');
    const playerCover = document.getElementById('player-cover');
    const playerTitle = document.getElementById('player-title');
    const playerArtist = document.getElementById('player-artist');
    const lyricsModal = document.getElementById('lyrics-modal');
    const lyricsContainer = document.getElementById('lyrics-container');
    const toggleLyricsBtn = document.getElementById('toggle-lyrics');

    /* --- Initialization --- */
    async function init() {
      try {
        const response = await fetch(FIREBASE_URL);
        db = await response.json();
        handleRoute(); // Render view based on URL hash
      } catch (error) {
        appContent.innerHTML = `<p style="color: red; text-align: center;">Error loading database: ${error.message}</p>`;
      }
    }

    /* --- Router --- */
    function handleRoute() {
      const hash = window.location.hash || '#home';
      const [route, id] = hash.replace('#', '').split('/');

      appContent.innerHTML = ''; // Clear current view
      window.scrollTo(0, 0);

      if (route === 'home') renderHome();
      else if (route === 'album' && id) renderAlbum(id);
      else if (route === 'artist' && id) renderArtist(id);
      else renderHome();
    }
    window.addEventListener('hashchange', handleRoute);

    /* --- Views Rendering --- */
    function renderHome() {
      let html = `<h2 style="margin-bottom: 20px;">Featured Albums</h2><div class="grid">`;
      
      for (const [albumId, album] of Object.entries(db.albums)) {
        const artistName = db.artists[album.artistId]?.name || "Unknown Artist";
        html += `
          <a href="#album/${albumId}" class="card glass">
            <img src="${album.coverUrl}" alt="${album.title} cover" onerror="this.src='https://via.placeholder.com/200?text=No+Cover'">
            <h3>${album.title}</h3>
            <p>${artistName} • ${album.year}</p>
          </a>
        `;
      }
      html += `</div>`;
      appContent.innerHTML = html;
    }

    function renderAlbum(albumId) {
      const album = db.albums[albumId];
      if (!album) return appContent.innerHTML = '<p>Album not found.</p>';
      const artist = db.artists[album.artistId];

      let html = `
        <div class="view-header">
          <img src="${album.coverUrl}" alt="${album.title}" onerror="this.src='https://via.placeholder.com/200?text=No+Cover'">
          <div>
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">${album.title}</h1>
            <p style="font-size: 1.2rem; color: var(--text-muted);">
              <a href="#artist/${album.artistId}">${artist?.name || 'Unknown'}</a> • ${album.year}
            </p>
          </div>
        </div>
        <div class="track-list">
      `;

      for (const [songId, song] of Object.entries(album.songs)) {
        html += `
          <div class="track-item glass" onclick="playSong('${songId}', '${albumId}')">
            <div class="track-info">
              <h4>${song.title}</h4>
              <p>${artist?.name || 'Unknown'}</p>
            </div>
            <span>▶</span>
          </div>
        `;
      }
      html += `</div>`;
      appContent.innerHTML = html;
    }

    function renderArtist(artistId) {
      const artist = db.artists[artistId];
      if (!artist) return appContent.innerHTML = '<p>Artist not found.</p>';

      let html = `
        <div class="view-header">
          <img src="${artist.image}" alt="${artist.name}" style="border-radius: 50%;" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
          <div>
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">${artist.name}</h1>
            <p style="color: var(--text-muted); max-width: 500px;">${artist.bio}</p>
          </div>
        </div>
        <h2 style="margin: 30px 0 20px;">Albums</h2>
        <div class="grid">
      `;

      for (const [albumId, album] of Object.entries(db.albums)) {
        if (album.artistId === artistId) {
          html += `
            <a href="#album/${albumId}" class="card glass">
              <img src="${album.coverUrl}" alt="${album.title}">
              <h3>${album.title}</h3>
              <p>${album.year}</p>
            </a>
          `;
        }
      }
      html += `</div>`;
      appContent.innerHTML = html;
    }

    /* --- Audio Player Logic --- */
    async function playSong(songId, albumId) {
      const album = db.albums[albumId];
      const song = album.songs[songId];
      const artist = db.artists[album.artistId];

      currentTrack = song;
      
      // Update UI
      playerTitle.innerText = song.title;
      playerArtist.innerText = artist?.name || 'Unknown';
      playerCover.src = album.coverUrl;

      // Play Audio
      audio.src = song.audioUrl;
      audio.play();
      isPlaying = true;
      playPauseBtn.innerText = '⏸';

      // Reset & Load Lyrics
      lyricsData = [];
      lyricsContainer.innerHTML = '<p class="lyric-line">Loading lyrics...</p>';
      
      if (song.lyricsUrl) {
        try {
          const lrcText = await fetch(song.lyricsUrl).then(res => res.text());
          parseLRC(lrcText);
        } catch (e) {
          lyricsContainer.innerHTML = '<p class="lyric-line">Error loading lyrics.</p>';
        }
      } else {
        lyricsContainer.innerHTML = '<p class="lyric-line">Instrumental / No Lyrics Available</p>';
      }
    }

    playPauseBtn.addEventListener('click', () => {
      if (!audio.src) return;
      if (isPlaying) { audio.pause(); isPlaying = false; playPauseBtn.innerText = '▶'; } 
      else { audio.play(); isPlaying = true; playPauseBtn.innerText = '⏸'; }
    });

    audio.addEventListener('timeupdate', () => {
      // Update Progress Bar
      if (audio.duration) {
        const progressPercent = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = `${progressPercent}%`;
        timeCurrent.innerText = formatTime(audio.currentTime);
        timeTotal.innerText = formatTime(audio.duration);
      }
      syncLyrics();
    });

    progressBar.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = progressBar.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const width = rect.width;
      audio.currentTime = (clickX / width) * audio.duration;
    });

    audio.addEventListener('ended', () => {
      isPlaying = false;
      playPauseBtn.innerText = '▶';
    });

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    /* --- Lyrics Engine --- */
    function parseLRC(lrcText) {
      lyricsData = [];
      const lines = lrcText.split('\n');
      const timeRegEx = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;

      lines.forEach(line => {
        const match = timeRegEx.exec(line);
        if (match) {
          const m = parseInt(match[1], 10);
          const s = parseInt(match[2], 10);
          const ms = parseInt(match[3], 10) / (match[3].length === 2 ? 100 : 1000);
          const time = m * 60 + s + ms;
          const text = line.replace(timeRegEx, '').trim();
          if (text) lyricsData.push({ time, text });
        }
      });

      // Render lyrics to DOM
      lyricsContainer.innerHTML = lyricsData.map((l, i) => 
        `<p class="lyric-line" id="lyric-${i}">${l.text}</p>`
      ).join('');
    }

    function syncLyrics() {
      if (!isLyricsOpen || lyricsData.length === 0) return;
      
      const currentTime = audio.currentTime;
      let activeIndex = -1;

      // Find the current line
      for (let i = 0; i < lyricsData.length; i++) {
        if (currentTime >= lyricsData[i].time) {
          activeIndex = i;
        } else {
          break;
        }
      }

      if (activeIndex !== -1) {
        // Remove active class from all
        document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
        
        // Add active class and scroll
        const activeEl = document.getElementById(`lyric-${activeIndex}`);
        if (activeEl) {
          activeEl.classList.add('active');
          // Smooth scroll to keep current line in center
          activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
    }

    toggleLyricsBtn.addEventListener('click', () => {
      isLyricsOpen = !isLyricsOpen;
      lyricsModal.classList.toggle('active');
      document.body.style.overflow = isLyricsOpen ? 'hidden' : ''; // Prevent body scroll when open
      if (isLyricsOpen) syncLyrics();
    });

    // Boot App
    init();

  </script>
</body>
</html>
